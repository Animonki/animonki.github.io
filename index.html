<style>
:root{
  --yellow:#FFCC33;
  --ink:#F4F0E6;
  --dim:#A9A296;
  --body:'Google Sans','DM Sans','Product Sans',sans-serif;
  --title:'Jost',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
a{color:inherit}
body{font-family:var(--body);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;background:#000;overflow:hidden}
.bg{
  position:fixed;inset:0;
  background:url("/img/gorilla.jpg") center/cover no-repeat;
  animation:ken 26s ease-in-out infinite alternate;
}
@keyframes ken{from{transform:scale(1)}to{transform:scale(1.08)}}
.veil{position:fixed;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.55),rgba(0,0,0,.15) 40%,rgba(0,0,0,.72) 92%)}
header{display:flex;align-items:center;justify-content:space-between;padding:28px 46px;position:relative;z-index:3}
header img{height:110px;width:auto;filter:drop-shadow(0 4px 18px rgba(0,0,0,.55))}
main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative;z-index:3;padding:0 24px}
.eyebrow{font-family:var(--title);font-weight:700;font-size:clamp(14px,1.7vw,21px);letter-spacing:.5em;text-transform:uppercase;color:var(--yellow);margin-bottom:34px;text-shadow:0 2px 6px rgba(0,0,0,.95),0 4px 22px rgba(0,0,0,.85)}
h1{font-family:var(--title);font-weight:800;text-transform:uppercase;font-size:clamp(54px,11vw,168px);line-height:1;letter-spacing:.02em;color:rgba(255,255,255,.92);text-shadow:0 10px 50px rgba(0,0,0,.55);mix-blend-mode:screen}
.sub{margin-top:22px;line-height:1.7;font-size:clamp(15px,1.6vw,19px);color:var(--ink);text-shadow:0 2px 12px rgba(0,0,0,.8)}
.sub b{color:var(--yellow);font-weight:700;font-size:1.12em;text-shadow:0 2px 6px rgba(0,0,0,.95),0 4px 20px rgba(0,0,0,.85)}
.cta{display:inline-block;margin-top:34px;font-family:var(--title);font-weight:600;font-size:13.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink);text-decoration:none;border:1.5px solid rgba(255,255,255,.85);padding:16px 36px;transition:all .2s ease;background:rgba(0,0,0,.18);backdrop-filter:blur(2px)}
.cta:hover{border-color:var(--yellow);color:var(--yellow)}
.mail{margin-top:14px;font-size:13.5px;color:rgba(244,240,230,.75)}
.mail a{color:var(--yellow);text-decoration:none}
footer{display:flex;justify-content:space-between;padding:24px 46px;font-size:12.5px;color:rgba(244,240,230,.6);position:relative;z-index:3}
.reveal{opacity:0;transform:translateY(24px);animation:up .9s cubic-bezier(.2,.7,.2,1) forwards}
.d1{animation-delay:.2s}.d2{animation-delay:.35s}.d3{animation-delay:.5s}.d4{animation-delay:.65s}
@keyframes up{to{opacity:1;transform:none}}
@media(max-width:820px){header,footer{padding:20px 24px}header img{height:64px}.f-right{display:none}}
@media(prefers-reduced-motion:reduce){.bg{animation:none}.reveal{animation:none;opacity:1;transform:none}}
</style></head><body>
  <div class="bg" role="img" aria-label="Primer plano de un gorila emergiendo de la oscuridad"></div>
  <div class="veil"></div>
  <header>
    <img src="/img/logo-animonki.png" alt="AniMonki Animation School">
  </header>
  <main>
    <div class="eyebrow reveal d1">Escuela online de animación de animales y criaturas</div>
    <h1 class="reveal d2">Próximamente</h1>
    <p class="sub reveal d3"><b>¡Estamos construyendo algo salvaje!</b><br>Workshops de animación · Grupos reducidos · Próximamente · 2027</p>
    <div class="reveal d4">
      <a class="cta" href="mailto:info@animonki.com">Escríbenos</a>
      <div class="mail"><a href="mailto:info@animonki.com">info@animonki.com</a></div>
    </div>
  </main>
  <footer>
    <span>© 2026 AniMonki Animation School</span>
    <span class="f-right">Online animal &amp; creature animation school — coming 2027</span>
  </footer>
</body></html>
